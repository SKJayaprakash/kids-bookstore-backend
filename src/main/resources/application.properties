spring.application.name=backend

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/bookstore_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Error handling
server.error.include-message=always

# File Upload
app.upload.dir=/uploads

# Security (JWT) - valid for 24 hours
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000
# Google OAuth
bookstore.google.clientId=73164381864-2lja69ojtmf6liobjr5cn6rdc6s3kmtn.apps.googleusercontent.com

# Docker / Compose integration
app.api.url=${APP_API_URL:http://localhost:8081/api}
app.frontend.source=${APP_FRONTEND_SOURCE:/app/frontend-src}
app.compose.main=${APP_COMPOSE_MAIN:/app/compose/docker-compose.yml}
app.compose.shops=${APP_COMPOSE_SHOPS:/app/compose/docker-compose.shops.yml}

# logging.level.org.springframework.web.cors=DEBUG
# logging.level.org.springframework.security.web.cors=DEBUG
logging.level.com.bookstore=INFO
